apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-form
  labels:
    app: web-form
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-form
  template:
    metadata:
      labels:
        app: web-form
    spec:
      containers:
        - name: web-form
          image: "{{ .Values.image.registry }}/web-form:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
{{ include "appt.commonEnv" . | indent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
{{ toYaml .Values.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: web-form
spec:
  selector:
    app: web-form
  ports:
    - port: 80
      targetPort: 8080
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-form
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-form
                port:
                  number: 80
{{- end }}